name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tooling
        run: python -m pip install --quiet pytest ruff
      - name: Lint (ruff)
        run: python -m ruff check ai_council.py tests scripts
      - name: Byte-compile
        run: python -m py_compile ai_council.py tests/test_ai_council.py
      - name: Tests
        env:
          PYTHONUTF8: "1"
        run: python -m pytest -q tests
